{% extends "base.html" %}

{% block title %}Select Credential Type{% endblock %}

{% block content %}
<div class="container container-sm" style="max-width: 1000px;">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{{ url_for('credentials.credentials_overview') }}" class="text-decoration-none">Credentials</a></li>
            <li class="breadcrumb-item active text-light" aria-current="page">New Credential</li>
        </ol>
    </nav>
    
    <div class="mb-4">
        <h2 class="fw-bold mb-1">Select App</h2>
        <p class="text-secondary mb-0">Choose the system you want to connect to.</p>
    </div>

    <div class="row row-cols-1 row-cols-md-3 g-4">
        {% for type in types %}
        <div class="col">
            <a href="{{ url_for('credentials.credentials_new_form', credential_type=type.id) }}" class="text-decoration-none">
                <div class="card h-100 bg-dark border-secondary shadow-sm card-hover">
                    <div class="card-body text-center py-5">
                        <div class="mb-3 text-primary">
                            <i class="{{ type.icon }} fs-1"></i>
                        </div>
                        <h5 class="card-title fw-bold text-light">{{ type.name }}</h5>
                        <p class="card-text text-secondary small">{{ type.description }}</p>
                    </div>
                </div>
            </a>
        </div>
        {% endfor %}
    </div>
</div>

<style>
.card-hover {
    transition: transform 0.2s, background-color 0.2s;
}
.card-hover:hover {
    transform: translateY(-5px);
    background-color: #161b22 !important;
    border-color: #3b82f6 !important;
}
</style>
{% endblock %}
