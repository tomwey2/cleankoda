{% extends "base.html" %}

{% block content %}
<div class="container mt-5 mb-5">
    <form method="post">
        <div class="row">
            <div class="col-md-3">
                <div class="list-group">
                    <a class="list-group-item list-group-item-action active" data-bs-toggle="list"
                        href="#agent-config">Agent Configuration</a>
                    <a class="list-group-item list-group-item-action" data-bs-toggle="list" href="#issue-system">Issue
                        Tracking System</a>
                    <a class="list-group-item list-group-item-action" data-bs-toggle="list" href="#source-code">Source
                        Code Repository</a>
                    <a class="list-group-item list-group-item-action" data-bs-toggle="list" href="#llm-config">LLM
                        Configuration</a>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-3 mt-4 mb-4">Save Settings</button>
            </div>
            <div class="col-md-9">
                <div class="tab-content">
                    <div class="tab-pane fade show active" id="agent-config">
                        <div class="card">
                            <div class="card-header">
                                <h5>Agent Configuration</h5>
                            </div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label for="polling_interval_seconds" class="form-label">Polling Interval
                                        (seconds)</label>
                                    <input type="number" class="form-control" id="polling_interval_seconds"
                                        name="polling_interval_seconds"
                                        value="{{ settings.polling_interval_seconds or 60 }}" placeholder="e.g. 60"
                                        required />
                                </div>
                                <div class="form-check form-switch mb-3">
                                    <input class="form-check-input" type="checkbox" id="is_active" name="is_active" {%
                                        if settings.is_active %}checked{% endif %}>
                                    <label class="form-check-label" for="is_active">Activate Agent Polling</label>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Agent Skill level</label>
                                    <div>
                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input" type="radio" name="agent_skill_level"
                                                id="agent_skill_level_junior" value="JUNIOR" {% if
                                                form_data.agent_skill_level=="JUNIOR" %}checked{% endif %}>
                                            <label class="form-check-label"
                                                for="agent_skill_level_junior">Junior</label>
                                        </div>
                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input" type="radio" name="agent_skill_level"
                                                id="agent_skill_level_senior" value="SENIOR" {% if
                                                form_data.agent_skill_level=="SENIOR" %}checked{% endif %}>
                                            <label class="form-check-label"
                                                for="agent_skill_level_senior">Senior</label>
                                        </div>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Agent Gender</label>
                                    <div>
                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input" type="radio" name="agent_gender"
                                                id="agent_gender_male" value="MALE" {% if form_data.agent_gender=="MALE"
                                                %}checked{% endif %}>
                                            <label class="form-check-label" for="agent_gender_male">Male</label>
                                        </div>
                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input" type="radio" name="agent_gender"
                                                id="agent_gender_female" value="FEMALE" {% if
                                                form_data.agent_gender=="FEMALE" %}checked{% endif %}>
                                            <label class="form-check-label" for="agent_gender_female">Female</label>
                                        </div>
                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input" type="radio" name="agent_gender"
                                                id="agent_gender_unknown" value="UNKNOWN" {% if
                                                form_data.agent_gender=="UNKNOWN" %}checked{% endif %}>
                                            <label class="form-check-label" for="agent_gender_unknown">Unknown</label>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="tab-pane fade" id="issue-system">
                        <div class="card">
                            <div class="card-header">
                                <h5>Issue Tracking System</h5>
                            </div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label for="its_type" class="form-label">Issue Tracking System</label>
                                    <select class="form-select" id="its_type" name="its_type">
                                        <option value="TRELLO" {% if settings.its_type=="TRELLO" %}selected{% endif %}>
                                            Trello
                                        </option>
                                        <option value="GITHUB" {% if settings.its_type=="GITHUB" %}selected{% endif %}>
                                            GitHub Issues
                                        </option>
                                    </select>
                                </div>
                                <div id="issue-system-configs">
                                    <div class="card" id="trello-settings-card">
                                        <div class="card-header">
                                            <h5>Configuration</h5>
                                        </div>
                                        <div class="card-body">
                                            <div class="mb-3">
                                                <label for="its_credential_id" class="form-label">Trello
                                                    Credential</label>
                                                <select class="form-select" id="its_credential_id"
                                                    name="its_credential_id">
                                                    <option value="">-- Select Credential --</option>
                                                    {% for cred in trello_credentials %}
                                                    <option value="{{ cred.id }}" {% if
                                                        form_data.its_credential_id==cred.id %}selected{% endif %}>
                                                        {{ cred.name }}
                                                    </option>
                                                    {% endfor %}
                                                </select>
                                            </div>
                                            <div class="mb-3">
                                                <label for="its_base_url" class="form-label">Base URL</label>
                                                <input type="text" class="form-control" id="its_base_url"
                                                    name="its_base_url"
                                                    value="{{ form_data.its_base_url or 'https://api.trello.com' }}"
                                                    placeholder="https://api.trello.com/1">
                                            </div>
                                            <div class="mb-3">
                                                <label for="its_container_id" class="form-label">Container ID (Trello:
                                                    Board-ID |
                                                    GitHub: Repo-Name)</label>
                                                <input type="text" class="form-control" id="its_container_id"
                                                    name="its_container_id"
                                                    value="{{ form_data.its_container_id or '' }}"
                                                    placeholder="Container ID (e.g. 64d4...)">
                                            </div>
                                            <div class="mb-3" id="its_parent_id_field">
                                                <label for="its_parent_id" class="form-label">Parent ID (GitHub needs
                                                    Owner (Org/User))</label>
                                                <input type="text" class="form-control" id="its_parent_id"
                                                    name="its_parent_id" value="{{ form_data.its_parent_id or '' }}"
                                                    placeholder="Parent ID (e.g. 64d4...)">
                                            </div>
                                            <hr>
                                            <h6 class="mb-3">Column Mapping</h6>
                                            <div class="mb-3">
                                                <label for="its_state_backlog" class="form-label">Backlog state</label>
                                                <input type="text" class="form-control" id="its_state_backlog"
                                                    name="its_state_backlog"
                                                    value="{{ form_data.its_state_backlog or '' }}"
                                                    placeholder="e.g. Backlog">
                                            </div>
                                            <div class="mb-3">
                                                <label for="its_state_todo" class="form-label">Todo state</label>
                                                <input type="text" class="form-control" id="its_state_todo"
                                                    name="its_state_todo" value="{{ form_data.its_state_todo or '' }}"
                                                    placeholder="e.g. Todo">
                                            </div>
                                            <div class="mb-3">
                                                <label for="its_state_in_progress" class="form-label">In Progress
                                                    state</label>
                                                <input type="text" class="form-control" id="its_state_in_progress"
                                                    name="its_state_in_progress"
                                                    value="{{ form_data.its_state_in_progress or '' }}"
                                                    placeholder="e.g. In Progress">
                                            </div>
                                            <div class="mb-3">
                                                <label for="its_state_in_review" class="form-label">In Review
                                                    state</label>
                                                <input type="text" class="form-control" id="its_state_in_review"
                                                    name="its_state_in_review"
                                                    value="{{ form_data.its_state_in_review or '' }}"
                                                    placeholder="e.g. In Review">
                                            </div>
                                            <div class="mb-3">
                                                <label for="its_state_done" class="form-label">Done
                                                    state</label>
                                                <input type="text" class="form-control" id="its_state_done"
                                                    name="its_state_done" value="{{ form_data.its_state_done or '' }}"
                                                    placeholder="e.g. Done">
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="tab-pane fade" id="source-code">
                        <div class="card">
                            <div class="card-header">
                                <h5>Source Code Repository</h5>
                            </div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label for="vcs_type" class="form-label">Repository Type</label>
                                    <select class="form-select" id="vcs_type" name="vcs_type">
                                        <option value="GITHUB" {% if settings.vcs_type=="GITHUB" %}selected{% endif %}>
                                            GitHub</option>
                                        <option value="BITBUCKET" {% if settings.vcs_type=="BITBUCKET" %}selected{%
                                            endif %}>Bitbucket</option>
                                        <option value="GITLAB" {% if settings.vcs_type=="GITLAB" %}selected{% endif %}>
                                            GitLab</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label for="vcs_credential_id" class="form-label">GitHub Credential</label>
                                    <select class="form-select" id="vcs_credential_id" name="vcs_credential_id">
                                        <option value="">-- Select Credential --</option>
                                        {% for cred in github_credentials %}
                                        <option value="{{ cred.id }}" {% if form_data.vcs_credential_id==cred.id
                                            %}selected{% endif %}>
                                            {{ cred.name }}
                                        </option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label for="vcs_repo_url" class="form-label">Repository URL</label>
                                    <input type="text" class="form-control" id="vcs_repo_url" name="vcs_repo_url"
                                        value="{{ settings.vcs_repo_url }}"
                                        placeholder="https://github.com/org/repo.git">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="tab-pane fade" id="llm-config">
                        <div class="card">
                            <div class="card-header">
                                <h5>LLM Configuration</h5>
                            </div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label for="llm_credential_id" class="form-label">LLM Credential</label>
                                    <select class="form-select" id="llm_credential_id" name="llm_credential_id">
                                        <option value="">-- Select Credential --</option>
                                        {% for cred in llm_credentials %}
                                        <option value="{{ cred.id }}" {% if form_data.llm_credential_id==cred.id
                                            %}selected{% endif %}>
                                            {{ cred.name }} ({{ cred.credential_type }})
                                        </option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label for="llm_model_large" class="form-label">LLM for complex issues</label>
                                    <input type="text" class="form-control" id="llm_model_large" name="llm_model_large"
                                        placeholder="e.g. devstral-latest or gpt-4o"
                                        value="{{ form_data.llm_model_large or '' }}">
                                </div>
                                <div class="mb-3">
                                    <label for="llm_model_small" class="form-label">LLM for simple issues</label>
                                    <input type="text" class="form-control" id="llm_model_small" name="llm_model_small"
                                        placeholder="e.g. mistral-small" value="{{ form_data.llm_model_small or '' }}">
                                </div>
                                <div class="mb-3">
                                    <label for="llm_temperature" class="form-label">Temperature (Creativity) <span
                                            id="temperature_value">{{ form_data.llm_temperature or 0.0 }}</span></label>
                                    <input type="range" class="form-range" id="llm_temperature" name="llm_temperature"
                                        min="0.0" max="1.0" step="0.1" value="{{ form_data.llm_temperature or 0.0 }}">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </form>
</div>

<script>
    const temperature_slider = document.getElementById("llm_temperature");
    const temperature_value = document.getElementById("temperature_value");
    if (temperature_slider) {
        temperature_slider.oninput = function () {
            temperature_value.innerHTML = this.value;
        };
    }

    // Restore active tabs from sessionStorage
    document.addEventListener('DOMContentLoaded', function () {
        const activeSection = sessionStorage.getItem('activeSection');
        if (activeSection) {
            const sectionLink = document.querySelector(`[href="#${activeSection}"]`);
            if (sectionLink) {
                const tab = new bootstrap.Tab(sectionLink);
                tab.show();
            }
        }

        // Logic to show/hide issue tracking system fields based on dropdown
        const itsTypeSelect = document.getElementById('its_type');
        const itsParentIdField = document.getElementById('its_parent_id_field');

        function toggleIssueSystemCards() {
            if (!itsTypeSelect) return;
            const selectedItsType = itsTypeSelect.value;
            if (itsParentIdField) {
                itsParentIdField.style.display = selectedItsType === 'GITHUB' ? 'block' : 'none';
            }
        }

        if (itsTypeSelect) {
            toggleIssueSystemCards(); // Set initial state on page load
            itsTypeSelect.addEventListener('change', toggleIssueSystemCards);
        }
    });

    // Save active section when changed
    document.querySelectorAll('.list-group [data-bs-toggle="list"]').forEach(function (item) {
        item.addEventListener('shown.bs.tab', function (event) {
            const targetId = event.target.getAttribute('href').substring(1);
            sessionStorage.setItem('activeSection', targetId);
        });
    });
</script>
{% endblock %}
