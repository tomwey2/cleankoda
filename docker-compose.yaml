services:
  # ----------------------------------------
  # CONTAINER 1: the cleankoda frontend
  # ----------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.cleankoda-frontend
    container_name: cleankoda-frontend
    ports:
      - "5000:5000"
    command: uv run run_web.py # <-- Startet NUR Flask
    env_file: .env
    environment:
      - WORKSPACE=/coding-agent-workspace
    volumes:
      - workspace:/coding-agent-workspace
      - ./src/instance:/coding-agent/src/instance

  # ----------------------------------------
  # CONTAINER 2: the cleankoda agent
  # ----------------------------------------
  agent:
    build:
      context: .
      dockerfile: Dockerfile.cleankoda-agent
    container_name: cleankoda-agent
    command: uv run run_agent.py
    env_file: .env
    environment:
      - WORKSPACE=/coding-agent-workspace
      - WORKBENCH_WORKSPACE=/coding-agent-workspace
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - ./src/instance:/coding-agent/src/instance
      - workspace:/coding-agent-workspace
      # the socket to connect to the docker daemon
      - /var/run/docker.sock:/var/run/docker.sock

  # ----------------------------------------
  # CONTAINER 3: the cleankoda workbench
  # ----------------------------------------
  workbench:
    build:
      context: .
      dockerfile: Dockerfile.workbench-java-backend
    container_name: cleankoda-workbench
    volumes:
      - workspace:/coding-agent-workspace
      # Optional: Maven Cache (macht Tests schneller)
      - maven_cache:/root/.m2
      # the socket to connect to the docker daemon
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  workspace:
  maven_cache:
